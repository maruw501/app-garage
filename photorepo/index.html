<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#b3261e">
  <meta name="description" content="写真を撮ってコメントを入力するだけ。現場報告をPDF・Excelにまとめて共有できます。">
  <title>フォトレポ</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./ads.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">PHOTO REPORT</p>
        <h1>フォトレポ</h1>
        <p class="tagline">撮る、書く、まとめる。現場報告をスマホひとつで。</p>
      </div>
    </header>
    <main class="workspace">
      <section class="intro-copy" aria-label="アプリ紹介">
        <strong>写真報告、スマホで完結。</strong>
        <span>写真を撮ってコメントを入力するだけ。現場の状況をPDF・Excelにまとめて、すぐに共有できます。</span>
      </section>
      <aside class="ad-slot" id="adSlotTop" aria-label="広告"><span class="ad-label">広告</span><div class="ad-code-target" data-ad-slot="top">広告掲載スペース</div></aside>
      <section class="panel setup-panel" aria-label="巡回情報">
        <div class="panel-title"><h2>巡回情報</h2></div>
        <div class="form-grid">
          <label><span>拠点名</span><input id="storeName" type="text" autocomplete="organization" placeholder="例: ○○店"></label>
          <label><span>巡回日</span><input id="visitDate" type="date"></label>
          <label><span>担当者</span><input id="inspectorName" type="text" autocomplete="name" placeholder="例: 山田"></label>
        </div>
        <label class="wide-field"><span>全体メモ</span><textarea id="summaryNote" rows="3" placeholder="全体の共有事項があれば入力"></textarea></label>
      </section>
      <section class="panel photo-panel" aria-label="写真一覧">
        <div class="panel-title compact photo-title">
          <div class="photo-heading"><h2>写真</h2><span class="count-badge" id="photoCount">0枚</span></div>
          <div class="photo-actions">
            <label class="photo-action-button" id="cameraButton"><span>撮影して追加</span><input id="cameraInput" class="action-file-input" type="file" accept="image/*" capture="environment"></label>
            <button class="ghost-button photo-add-button" type="button" id="fileButton">写真追加</button>
          </div>
        </div>
        <div class="empty-state" id="emptyState"><strong>写真欄を追加してください</strong><span>撮影または写真追加から、写真とコメントを登録できます。</span></div>
        <div class="photo-grid" id="photoGrid"></div>
      </section>
      <section class="panel output-panel" aria-label="ファイル出力">
        <div class="output-actions">
          <button class="primary-button" type="button" id="pdfButton">PDF作成・共有</button>
          <button class="excel-button" type="button" id="excelButton">Excel作成・共有</button>
          <button class="danger-button" type="button" id="clearButton">全消去</button>
        </div>
        <p class="status-line" id="statusLine" role="status" aria-live="polite"></p>
        <div class="download-box hidden" id="downloadBox">
          <div><strong>PDF作成済み</strong><span>直接共有できない場合は、PDFを開いて保存してください。</span></div>
          <div class="download-actions"><a class="secondary-button" id="downloadLink" href="#" download>PDFを開く</a><button class="secondary-button" type="button" id="shareAgainButton">再共有</button></div>
        </div>
      </section>
      <aside class="ad-slot" id="adSlotBottom" aria-label="広告"><span class="ad-label">広告</span><div class="ad-code-target" data-ad-slot="bottom">広告掲載スペース</div></aside>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
